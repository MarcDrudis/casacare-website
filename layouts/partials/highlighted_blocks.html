{{/*
  Overlay Text Section - No white boxes
  Displays text and icons directly over background image
  Usage: {{ partial "highlighted_blocks.html" . }}
*/}}

<!-- Import Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<div class="overlay-text-section" style="position: absolute; bottom: 15px; left: 0; right: 0; z-index: 3;">
    <div class="container">
        <div class="row justify-content-center">
            
            <!-- Feature 1 -->
            <div class="col-md-4 col-sm-12 mb-4 mb-md-0">
                <div class="feature-text" style="text-align: center; transition: all 0.3s ease;">
                    <div class="feature-icon" style="margin-bottom: 15px;">
                        <i class="fas fa-user-friends" style="font-size: 42px; color: #FFFFFF; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);"></i>
                    </div>
                    <h3 style="color: #FFFFFF; font-size: 18px; font-weight: 500; margin: 0; line-height: 1.3; font-family: 'Inter', sans-serif; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);">
                        {{ i18n "personalized_advice" }}
                    </h3>
                </div>
            </div>
            
            <!-- Feature 2 -->
            <div class="col-md-4 col-sm-12 mb-4 mb-md-0">
                <div class="feature-text" style="text-align: center; transition: all 0.3s ease;">
                    <div class="feature-icon" style="margin-bottom: 15px;">
                        <i class="fas fa-award" style="font-size: 42px; color: #FFFFFF; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);"></i>
                    </div>
                    <h3 style="color: #FFFFFF; font-size: 18px; font-weight: 500; margin: 0; line-height: 1.3; font-family: 'Inter', sans-serif; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);">
                        {{ i18n "highly_qualified_candidates" }}
                    </h3>
                </div>
            </div>
            
            <!-- Feature 3 -->
            <div class="col-md-4 col-sm-12 mb-4 mb-md-0">
                <div class="feature-text" style="text-align: center; transition: all 0.3s ease;">
                    <div class="feature-icon" style="margin-bottom: 15px;">
                        <i class="fas fa-hands-helping" style="font-size: 42px; color: #FFFFFF; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);"></i>
                    </div>
                    <h3 style="color: #FFFFFF; font-size: 18px; font-weight: 500; margin: 0; line-height: 1.3; font-family: 'Inter', sans-serif; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);">
                        {{ i18n "reliable_support_every_step" }}
                    </h3>
                </div>
            </div>
            
        </div>
    </div>
</div>

<!-- Overlay Text Effects -->
<style>
    .feature-text:hover h3 {
        transform: translateY(-3px);
        transition: all 0.3s ease;
        text-shadow: 2px 2px 6px rgba(0,0,0,0.9) !important;
    }
    
    .feature-text:hover .feature-icon i {
        transform: scale(1.1);
        transition: all 0.3s ease;
        text-shadow: 2px 2px 6px rgba(0,0,0,0.9) !important;
    }
    
    @media (max-width: 992px) {
        .overlay-text-section {
            bottom: 100px !important;
        }
        
        .feature-icon i {
            font-size: 38px !important;
        }
        
        .feature-text h3 {
            font-size: 16px !important;
        }
    }
    
    @media (max-width: 768px) {
        .overlay-text-section {
            bottom: 80px !important;
            position: relative !important;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.3));
            padding: 40px 0 !important;
        }
        
        .feature-text {
            margin-bottom: 25px !important;
        }
        
        .feature-icon i {
            font-size: 36px !important;
        }
        
        .feature-text h3 {
            font-size: 16px !important;
        }
    }
    
    @media (max-width: 480px) {
        .overlay-text-section {
            bottom: 60px !important;
            padding: 30px 0 !important;
        }
        
        .feature-icon i {
            font-size: 32px !important;
        }
        
        .feature-text h3 {
            font-size: 14px !important;
        }
    }
</style>
