{{/*
  Overlay Text Section - Simplified and Centered
  Displays text and icons directly over background image
  Usage: {{ partial "highlighted_blocks.html" . }}
*/}}

<!-- Import Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<div class="highlighted-blocks-overlay">
    <div class="container">
        <div class="row">
            
            <!-- Feature 1 -->
            <div class="col-md-4 col-sm-4 col-xs-12">
                <div class="feature-block">
                    <div class="feature-icon">
                        <i class="fas fa-user-friends"></i>
                    </div>
                    <h3 class="feature-title">
                        {{ i18n "personalized_advice" }}
                    </h3>
                </div>
            </div>
            
            <!-- Feature 2 -->
            <div class="col-md-4 col-sm-4 col-xs-12">
                <div class="feature-block">
                    <div class="feature-icon">
                        <i class="fas fa-award"></i>
                    </div>
                    <h3 class="feature-title">
                        {{ i18n "highly_qualified_candidates" }}
                    </h3>
                </div>
            </div>
            
            <!-- Feature 3 -->
            <div class="col-md-4 col-sm-4 col-xs-12">
                <div class="feature-block">
                    <div class="feature-icon">
                        <i class="fas fa-hands-helping"></i>
                    </div>
                    <h3 class="feature-title">
                        {{ i18n "reliable_support_every_step" }}
                    </h3>
                </div>
            </div>
            
        </div>
    </div>
</div>

<style>
/* Highlighted Blocks Overlay Styles */
.highlighted-blocks-overlay {
    width: 100%;
    padding: 40px 0;
    background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.4) 100%);
    margin-top: auto;
}

.feature-block {
    text-align: center;
    padding: 20px 15px;
    transition: all 0.3s ease;
}

.feature-icon {
    margin-bottom: 15px;
}

.feature-icon i {
    font-size: 48px;
    color: #FFFFFF;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
    transition: all 0.3s ease;
}

.feature-title {
    color: #FFFFFF;
    font-size: 18px;
    font-weight: 500;
    margin: 0;
    line-height: 1.4;
    font-family: 'Inter', sans-serif;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.8);
    transition: all 0.3s ease;
}

/* Hover Effects */
.feature-block:hover .feature-icon i {
    transform: scale(1.15);
    text-shadow: 3px 3px 10px rgba(0,0,0,0.9);
}

.feature-block:hover .feature-title {
    transform: translateY(-3px);
    text-shadow: 3px 3px 8px rgba(0,0,0,0.9);
}

/* Tablet Styles */
@media (max-width: 991px) {
    .highlighted-blocks-overlay {
        padding: 30px 0;
    }
    
    .feature-icon i {
        font-size: 42px;
    }
    
    .feature-title {
        font-size: 16px;
    }
}

/* Mobile Styles */
@media (max-width: 767px) {
    .highlighted-blocks-overlay {
        position: relative;
        padding: 50px 0;
        background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.5) 50%, rgba(0,0,0,0.6) 100%);
    }
    
    .feature-block {
        padding: 25px 15px;
        margin-bottom: 10px;
    }
    
    .feature-icon i {
        font-size: 40px;
    }
    
    .feature-title {
        font-size: 17px;
        line-height: 1.5;
    }
}

/* Small Mobile Styles */
@media (max-width: 480px) {
    .highlighted-blocks-overlay {
        padding: 40px 0;
    }
    
    .feature-block {
        padding: 20px 10px;
    }
    
    .feature-icon i {
        font-size: 36px;
    }
    
    .feature-title {
        font-size: 15px;
    }
}
</style>
